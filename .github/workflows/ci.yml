name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Annule les runs précédents sur la même branche
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    env:
      # Variables minimales pour faire passer le build Next sans accès DB réelle.
      DATABASE_URL: "mongodb://placeholder:placeholder@localhost:27017/conge?replicaSet=rs0&authSource=admin"
      JWT_SECRET: "ci-placeholder-secret-not-used-at-runtime"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

  security:
    name: Audit dépendances
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Ne bloque pas la CI : audit informatif
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
